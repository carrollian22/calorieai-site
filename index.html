<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalorieAI - Food and Macro Log</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #C5E8E3 0%, #FAFAF8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #2D2D2D;
        }
        .container {
            max-width: 600px;
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 {
            font-size: 36px;
            font-weight: 700;
            color: #2A9D8F;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        .tagline {
            font-size: 18px;
            color: #8E8E8E;
            margin-bottom: 40px;
        }
        .description {
            font-size: 16px;
            line-height: 1.6;
            color: #666666;
            margin-bottom: 40px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }
        .link {
            display: inline-block;
            background: #2A9D8F;
            color: white;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: background 0.2s;
        }
        .link:hover {
            background: #248276;
        }
        .link.secondary {
            background: #F0FAF9;
            color: #2A9D8F;
        }
        .link.secondary:hover {
            background: #E0F5F2;
        }
        .footer {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid #F0F0F0;
        }
        .footer a {
            color: #2A9D8F;
            text-decoration: none;
            font-size: 14px;
            margin: 0 12px;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            .container {
                padding: 32px 24px;
            }
            h1 {
                font-size: 28px;
            }
            .tagline {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CalorieAI</h1>
        <p class="tagline">Food and Macro Log</p>
        <p class="description">
            Track your nutrition with AI-powered food logging. Get personalized calorie targets,
            macro breakdowns, and insights to reach your goals—whether you're losing, maintaining, or gaining weight.
        </p>
        <div class="links">
            <a href="mailto:support@calorieai.us" class="link">Contact Support</a>
            <a href="/privacy.html" class="link secondary">Privacy Policy</a>
        </div>
        <div class="footer">
            <a href="mailto:support@calorieai.us">support@calorieai.us</a>
        </div>
    </div>
</body>
</html>
